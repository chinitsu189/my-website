<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lho.010 - Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap" rel="stylesheet">

<style>
    * { box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; margin: 0; }

    .text-glow { text-shadow: 0 0 25px rgba(192,132,252,0.8); }
    #intro-screen { z-index: 9999 !important; }

    @keyframes heartBeat {
        0%,100% { transform: scale(1); }
        25%      { transform: scale(1.3); }
        75%      { transform: scale(1.18); }
    }
    @keyframes keyGlow {
        0%,100% { filter: drop-shadow(0 0 5px gold); }
        50%      { filter: drop-shadow(0 0 20px gold); }
    }
    .heart-anim { animation: heartBeat 1.2s infinite; }
    .key-anim   { animation: keyGlow 1s infinite; }

    /* ── الكارت الرئيسي ── شفاف متوسط + زوايا منحنية كثير */
    #card {
        background: rgba(25, 8, 50, 0.55);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(160, 90, 255, 0.28);
        border-radius: 32px;
        box-shadow:
            0 0 80px rgba(120, 40, 200, 0.3),
            inset 0 0 60px rgba(100, 30, 180, 0.08);
        /* تحريك الصورة للخارج */
        padding-top: 70px;
        margin-top: 70px;
    }

    /* ── صفوف السوشيال ── */
    .social-row {
        background: rgba(70, 15, 130, 0.50);
        border: 1px solid rgba(160, 90, 255, 0.20);
        border-radius: 18px;
        transition: background 0.2s, transform 0.15s;
    }
    .social-row:hover {
        background: rgba(100, 30, 180, 0.65);
        transform: translateX(3px);
    }

    /* ── مشغل الموسيقى ── */
    .player-box {
        background: rgba(70, 15, 130, 0.50);
        border: 1px solid rgba(160, 90, 255, 0.20);
        border-radius: 18px;
    }

    /* ── شريط التقدم ── */
    #progress-track {
        background: rgba(255,255,255,0.12);
        border-radius: 99px;
        height: 5px;
        cursor: pointer;
        position: relative;
        flex: 1;
    }
    #progress-fill {
        background: linear-gradient(90deg, #7c3aed, #c084fc);
        height: 100%;
        border-radius: 99px;
        width: 0%;
        box-shadow: 0 0 8px #c084fc;
        transition: width 0.1s linear;
    }
    #progress-dot {
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 14px; height: 14px;
        background: white;
        border-radius: 50%;
        box-shadow: 0 0 6px rgba(0,0,0,0.5);
        pointer-events: none;
    }

    /* ── الصورة الشخصية تطلع فوق الكارت ── */
    .avatar-wrapper {
        position: absolute;
        top: -70px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
    }
    .avatar-img {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid rgba(160, 90, 255, 0.6);
        box-shadow: 0 0 40px rgba(160, 90, 255, 0.55), 0 8px 32px rgba(0,0,0,0.5);
    }

    /* أيقونات السوشيال الدائرية */
    .icon-btn {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: rgba(100, 30, 180, 0.45);
        border: 1px solid rgba(160, 90, 255, 0.30);
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, transform 0.15s;
        color: white;
        text-decoration: none;
        font-size: 15px;
    }
    .icon-btn:hover {
        background: rgba(130, 50, 220, 0.65);
        transform: scale(1.08);
    }
</style>
</head>
<body class="min-h-screen w-screen flex items-center justify-center overflow-x-hidden bg-black text-white select-none">

    <!-- Intro Screen -->
    <div id="intro-screen" onclick="enterSite()"
         class="fixed inset-0 z-[9999] bg-black/95 backdrop-blur-md flex flex-col items-center justify-center cursor-pointer transition-all duration-700">
        <div class="relative flex flex-col items-center justify-center group">
            <div class="absolute -inset-4 bg-purple-600/40 rounded-full blur-2xl group-hover:bg-purple-500/60 transition duration-500 animate-pulse"></div>
            <span class="text-purple-400 text-xs tracking-[0.3em] font-mono uppercase mb-2 opacity-80">Welcome to</span>
            <h2 class="relative text-white text-2xl sm:text-3xl md:text-4xl font-black tracking-[0.15em] uppercase text-glow animate-bounce">
                [ Click To Enter ]
            </h2>
            <p class="relative text-gray-400 text-xs mt-4 font-mono tracking-wider flex items-center gap-1.5 opacity-70">
                <span>Turn on your volume</span>
                <i class="fa-solid fa-volume-high text-purple-400 animate-pulse"></i>
            </p>
        </div>
    </div>

    <!-- فيديو الخلفية -->
    <video autoplay loop muted playsinline
           class="fixed z-0 w-auto min-w-full min-h-full max-w-none object-cover opacity-80">
        <source src="bg.mp4" type="video/mp4">
    </video>

    <!-- ══════════ الكارت ══════════ -->
    <div id="card" class="relative z-10 w-[92vw] max-w-[560px] p-6 sm:p-8 flex flex-col items-center">

        <!-- الصورة الشخصية تطلع فوق الكارت -->
        <div class="avatar-wrapper">
            <!-- القلب فوق الصورة -->
            <div class="absolute -top-7 left-1/2 -translate-x-1/2 text-red-500 text-2xl heart-anim z-30">❤️</div>
            <!-- مفتاح السر -->
            <button onclick="openLoveGuess()"
                class="absolute -top-1 left-1/2 -translate-x-1/2 z-20 text-yellow-400 text-2xl hover:scale-110 transition key-anim">
                🔑
            </button>
            <img src="me.jpg" class="avatar-img">
        </div>

        <!-- شريط العداد والجوهرة -->
        <div class="flex justify-between items-center w-full mb-5">
            <div class="flex items-center gap-2 bg-white/[0.07] px-3 py-1.5 rounded-full border border-white/10">
                <i class="fa-solid fa-eye text-purple-400 text-xs animate-pulse"></i>
                <span id="view-counter" class="font-mono text-xs text-purple-200 tracking-wider">1,350</span>
            </div>
            <div class="w-9 h-9 rounded-full bg-white/[0.06] border border-white/10 flex items-center justify-center text-purple-400">
                <i class="fa-regular fa-gem text-sm"></i>
            </div>
        </div>

        <!-- الاسم والبايو -->
        <h1 class="text-2xl sm:text-3xl font-black tracking-wider text-white mt-1 mb-1">lho.010</h1>
        <div class="text-center text-xs sm:text-sm text-gray-300 mb-5 leading-relaxed font-semibold">
            <p>Always for her,</p>
            <p>Always with her 🤍<span class="animate-pulse text-purple-400 font-normal">|</span></p>
        </div>

        <!-- أيقونات السوشيال -->
        <div class="flex items-center gap-3 mb-6">
            <a href="https://discord.com/users/lho.010" target="_blank" class="icon-btn"><i class="fa-brands fa-discord"></i></a>
            <a href="https://www.instagram.com/lho.010/" target="_blank" class="icon-btn"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://t.me/euuo_y7" target="_blank" class="icon-btn"><i class="fa-brands fa-telegram"></i></a>
        </div>

        <!-- ── صفوف السوشيال ── -->
        <div class="w-full flex flex-col gap-3">

            <!-- Instagram -->
            <div class="social-row w-full flex items-center justify-between px-4 py-3">
                <div class="flex items-center gap-3">
                    <div class="relative flex-shrink-0">
                        <img src="insta.jpg" class="w-12 h-12 rounded-full object-cover border border-purple-400/30">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-black"></span>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-white">Instagram</h3>
                        <p class="text-[11px] text-purple-300/60">@lho.010</p>
                    </div>
                </div>
                <a href="https://www.instagram.com/lho.010/" target="_blank"
                   class="flex items-center gap-1.5 text-[12px] font-bold text-white/80 hover:text-white transition whitespace-nowrap">
                    Follow <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </a>
            </div>

            <!-- Discord -->
            <div class="social-row w-full flex items-center justify-between px-4 py-3">
                <div class="flex items-center gap-3">
                    <div class="relative flex-shrink-0">
                        <img src="dsic.jpg" class="w-12 h-12 rounded-full object-cover border border-purple-400/30">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-black"></span>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-white">Discord</h3>
                        <p class="text-[11px] text-purple-300/60">@lho.010</p>
                    </div>
                </div>
                <a href="https://discord.com/users/lho.010" target="_blank"
                   class="flex items-center gap-1.5 text-[12px] font-bold text-white/80 hover:text-white transition whitespace-nowrap">
                    Add Discord <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </a>
            </div>

            <!-- Telegram -->
            <div class="social-row w-full flex items-center justify-between px-4 py-3">
                <div class="flex items-center gap-3">
                    <div class="relative flex-shrink-0">
                        <img src="tel.jpg" class="w-12 h-12 rounded-full object-cover border border-purple-400/30">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-black"></span>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-white">t.me/euuo_y7</h3>
                        <p class="text-[11px] text-emerald-400 font-bold flex items-center gap-1 mt-0.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
                            Online Now
                        </p>
                    </div>
                </div>
                <a href="https://t.me/euuo_y7" target="_blank"
                   class="flex items-center gap-1.5 text-[12px] font-bold text-white/80 hover:text-white transition whitespace-nowrap">
                    Open Chat <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </a>
            </div>

            <!-- ── مشغل الموسيقى ── -->
            <div class="player-box w-full px-4 py-4 flex flex-col gap-3">
                <div class="flex items-center justify-between gap-3">
                    <div class="flex items-center gap-2 overflow-hidden flex-1">
                        <i class="fa-solid fa-volume-high text-purple-400 text-xs animate-bounce flex-shrink-0"></i>
                        <span class="text-xs font-bold text-purple-100 truncate tracking-wide">
                            Tom Odell - Another Love ( Slowed Reverb )
                        </span>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button onclick="audio.currentTime -= 10"
                                class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition">
                            <i class="fa-solid fa-backward-step text-xs"></i>
                        </button>
                        <button onclick="togglePlay()"
                                class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 transition shadow-md">
                            <i class="fa-solid fa-play ml-0.5 text-sm" id="play-icon"></i>
                        </button>
                        <button onclick="audio.currentTime += 10"
                                class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition">
                            <i class="fa-solid fa-forward-step text-xs"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-2 text-[10px] text-purple-200/60 font-mono">
                    <span id="curr-time">00:00</span>
                    <div id="progress-track" onclick="seekAudio(event)">
                        <div id="progress-fill"></div>
                        <div id="progress-dot" style="left:0%"></div>
                    </div>
                    <span id="duration">05:01</span>
                </div>
                <audio id="my-audio" src="song.mp3" loop></audio>
            </div>

        </div>
    </div><!-- /card -->

    <!-- ── Popup السر ── -->
    <div id="love-popup" class="fixed inset-0 hidden items-center justify-center bg-black/80 z-[99999]">
        <div class="relative bg-[#12091f] p-6 rounded-3xl border border-white/10 text-center w-[320px]">
            <button onclick="closeLoveGuess()" class="absolute top-3 right-4 text-white text-xl hover:text-red-400 transition">✕</button>
            <h2 class="text-xl font-bold mb-3">Guess my love's name 💜</h2>
            <input id="love-input" type="text"
                class="w-full px-4 py-2 rounded-xl bg-black/40 border border-white/10 text-white outline-none"
                placeholder="Type name...">
            <button onclick="checkLoveName()" class="mt-4 px-5 py-2 rounded-full bg-purple-500 hover:bg-purple-600 font-bold">Check</button>
            <p id="love-result" class="mt-4 text-sm"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <div id="flash-effect" style="display:none;position:fixed;inset:0;background:white;z-index:999998;opacity:0;"></div>

    <script>
        const audio       = document.getElementById("my-audio");
        const playIcon    = document.getElementById("play-icon");
        const introScreen = document.getElementById("intro-screen");

        /* ── تفعيل حركة الكارت 3D ── */
        VanillaTilt.init(document.querySelector("#card"), {
            max: 8, speed: 500, glare: true, "max-glare": 0.08, "full-page-listening": false
        });

        /* ── دخول الموقع ── */
        function enterSite() {
            audio?.play().catch(() => {});
            if (playIcon) playIcon.className = "fa-solid fa-pause text-sm";
            introScreen.style.opacity = "0";
            introScreen.style.pointerEvents = "none";
            setTimeout(() => introScreen.style.display = "none", 700);
        }
        document.addEventListener('click', () => {
            if (introScreen && introScreen.style.display !== "none") enterSite();
        });

        /* ── حماية ── */
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.onkeydown = e => {
            if (e.key==="F12"||(e.ctrlKey&&e.shiftKey&&["I","J"].includes(e.key))||(e.ctrlKey&&e.key==="U"))
                return false;
        };

        /* ── مشغل الموسيقى ── */
        function togglePlay() {
            if (audio.paused) { audio.play();  playIcon.className = "fa-solid fa-pause text-sm"; }
            else              { audio.pause(); playIcon.className = "fa-solid fa-play ml-0.5 text-sm"; }
        }
        function seekAudio(e) {
            const t = document.getElementById("progress-track");
            const r = t.getBoundingClientRect();
            const p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
            audio.currentTime = p * (audio.duration || 301);
        }
        audio.addEventListener("timeupdate", () => {
            const c = audio.currentTime, d = audio.duration || 301;
            const p = (c / d) * 100;
            document.getElementById("progress-fill").style.width = p + "%";
            document.getElementById("progress-dot").style.left   = p + "%";
            const m = Math.floor(c/60), s = Math.floor(c%60);
            document.getElementById("curr-time").innerText = `${m}:${s<10?'0':''}${s}`;
        });

        /* ── عداد الزيارات ── */
        fetch('https://api.counterapi.dev/v1/lho010_page/visits')
            .then(r=>r.json())
            .then(d=>{ document.getElementById('view-counter').innerText=(1350+(d.count||12)).toLocaleString(); })
            .catch(()=>{ document.getElementById('view-counter').innerText="1,368"; });

        /* ── شرارات الماوس ── */
        const starColors = ['#c084fc','#e879f9','#a855f7','#ffffff'];
        document.addEventListener('mousemove', e => {
            if (Math.random() > 0.55) return;
            const dot = document.createElement('div');
            dot.className = 'fixed pointer-events-none rounded-full z-50';
            const sz = Math.random()*5+3;
            const c  = starColors[Math.floor(Math.random()*starColors.length)];
            dot.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-sz/2}px;top:${e.clientY-sz/2}px;background:${c};box-shadow:0 0 ${sz*2.5}px ${c}`;
            document.body.appendChild(dot);
            dot.animate([
                {transform:'translate(0,0) scale(1)',opacity:1},
                {transform:`translate(${(Math.random()-.5)*120}px,${(Math.random()-.5)*120+20}px) scale(0)`,opacity:0}
            ],{duration:900,easing:'ease-out'});
            setTimeout(()=>dot.remove(),850);
        });

        /* ── popup السر ── */
        function openLoveGuess()  { document.getElementById("love-popup").classList.replace("hidden","flex"); }
        function closeLoveGuess() { document.getElementById("love-popup").classList.replace("flex","hidden"); }
        function checkLoveName() {
            const val = document.getElementById("love-input").value.trim().toLowerCase();
            const result = document.getElementById("love-result");
            if (val==="ladybug"||val==="دعسوقة"||val==="دعسوقه") {
                document.querySelector("#love-popup .relative").innerHTML = `
                    <button onclick="closeLoveGuess()" class="absolute top-3 right-4 text-white text-xl">✕</button>
                    <div class="py-12 px-6 text-center">
                        <div class="text-5xl mb-4">🐞</div>
                        <h2 class="text-3xl font-bold text-pink-400 mb-3">أحسنتِ</h2>
                        <p class="text-white text-lg">فقط أنتِ تعرفين هذا السر</p>
                        <p class="text-pink-300 mt-3 text-xl">❤️ غنية ❤️</p>
                    </div>`;
                const flash = document.getElementById("flash-effect");
                flash.style.display="block";
                flash.animate([{opacity:0},{opacity:.95},{opacity:0}],{duration:500});
                setTimeout(()=>flash.style.display="none",500);
                document.body.animate([
                    {transform:"translate(0,0)"},{transform:"translate(-8px,4px)"},
                    {transform:"translate(8px,-4px)"},{transform:"translate(0,0)"}
                ],{duration:500});
                confetti({particleCount:350,spread:360,startVelocity:55,ticks:300,scalar:1.4});
                const end=Date.now()+3000;
                (function frame(){
                    confetti({particleCount:8,angle:60,spread:100,origin:{x:0}});
                    confetti({particleCount:8,angle:120,spread:100,origin:{x:1}});
                    if(Date.now()<end) requestAnimationFrame(frame);
                })();
            } else {
                result.innerHTML = "Wrong answer ❌";
            }
        }
    </script>
</body>
</html>
